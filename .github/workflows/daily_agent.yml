name: TFM — Agente Diario de Mercado

on:
  schedule:
    - cron: '35 21 * * 1-5'
  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependencias
        run: |
          pip install --upgrade pip
          pip install \
            requests==2.31.0 \
            pandas==2.2.2 \
            numpy==1.26.4 \
            gspread==6.1.2 \
            google-auth==2.29.0

      - name: Ejecutar agente diario
        env:
          GMAIL_USER:                   ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:           ${{ secrets.GMAIL_APP_PASSWORD }}
          GOOGLE_SERVICE_ACCOUNT_JSON:  ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          FMP_KEY:                      ${{ secrets.FMP_KEY }}
        run: |
          python agent_daily_update.py

      - name: Notificar si falla
        if: failure()
        run: |
          echo "❌ El agente falló. Revisa los logs en Actions."
