name: Market Scanner

on:
  schedule:
    # Cada 30 min, 13:00-21:00 UTC, L-V (cubre la sesión US 9:30-16:00 ET
    # tanto en horario de verano como de invierno; el script comprueba
    # internamente si el mercado está abierto y sale si no lo está)
    - cron: "*/30 13-21 * * 1-5"
  workflow_dispatch: {}   # permite lanzarlo a mano desde la pestaña Actions

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install yfinance gspread google-auth pandas numpy lxml requests

      - name: Run scanner
        env:
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        # Si lo lanzas a mano (workflow_dispatch) usa --force para poder
        # probarlo aunque el mercado esté cerrado
        run: python scanner.py ${{ github.event_name == 'workflow_dispatch' && '--force' || '' }}
