name: Market Scanner

on:
  schedule:
    # 3 escaneos con rol (apertura / mediodía / cierre). Los 5 ticks cubren
    # horario de verano e invierno de NY; el script determina el rol según
    # la hora de NY y sale limpio si el rol ya se ejecutó o está fuera de franja.
    - cron: "45 13 * * 1-5"   # verano: 9:45 NY apertura | invierno: pre-mercado (skip)
    - cron: "45 14 * * 1-5"   # verano: 10:45 (skip, ya hecho) | invierno: 9:45 apertura
    - cron: "0 17 * * 1-5"    # verano: 13:00 mediodía | invierno: 12:00 mediodía
    - cron: "10 20 * * 1-5"   # verano: 16:10 cierre | invierno: 15:10 (skip)
    - cron: "10 21 * * 1-5"   # verano: 17:10 (skip) | invierno: 16:10 cierre
  workflow_dispatch: {}

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install yfinance gspread google-auth pandas numpy lxml requests

      - name: Run scanner
        env:
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        # El lanzamiento manual usa --force (simula rol apertura)
        run: python scanner.py ${{ github.event_name == 'workflow_dispatch' && '--force' || '' }}
